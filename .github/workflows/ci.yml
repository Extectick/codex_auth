name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall app tests

      - name: Run tests
        run: python -m pytest -q

      - name: Check JavaScript syntax
        shell: pwsh
        run: |
          if (Get-Command node -ErrorAction SilentlyContinue) {
            node --check app/web/app.js
          } else {
            Write-Host "Node is not available; skipping JavaScript syntax check."
          }

      - name: Build Windows executable
        shell: pwsh
        run: .\build.ps1

      - name: Prepare dev artifact
        shell: pwsh
        run: Copy-Item .\dist\ChatGPTSessionManager.exe .\dist\ChatGPTSessionManager-windows-x64-dev.exe

      - name: Upload dev artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTSessionManager-windows-x64-dev
          path: dist/ChatGPTSessionManager-windows-x64-dev.exe
